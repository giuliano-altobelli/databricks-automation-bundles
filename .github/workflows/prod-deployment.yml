name: Production Deployment

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  verify:
    name: Local verify parity
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0

      - name: Bootstrap tooling
        run: uv sync --locked --all-extras --dev

      - name: Run pytest
        run: uv run pytest -q

      - name: Run ruff
        run: uv run ruff check tools tests

      - name: Run prek
        run: uv run prek -c prek.toml run --all-files

      - name: Discover bundles
        run: uv run repoctl discover

      - name: Validate repository metadata
        run: uv run repoctl validate

      - name: Compute changed bundles
        env:
          CHANGED_BASE: ${{ github.event.before }}
          CHANGED_FALLBACK: ${{ github.sha }}
        run: |
          set -euo pipefail
          if [[ -z "$CHANGED_BASE" || "$CHANGED_BASE" =~ ^0+$ ]]; then
            CHANGED_BASE="$CHANGED_FALLBACK"
          fi
          uv run repoctl changed --base "$CHANGED_BASE"

  deploy-jira-prod:
    name: Deploy ABAC Jira access collection to prod
    needs: verify
    permissions:
      contents: read
    uses: ./.github/workflows/deploy.yml
    with:
      path: projects/platform-governance/bundles/abac-jira-access
      resource: project
      target: prod
      group: abac-jira-access-prod
    secrets:
      credential: ${{ secrets.DATABRICKS_PROD_CLIENT_SECRET }}

  deploy-general-prod:
    name: Deploy ABAC general access collection to prod
    needs: verify
    permissions:
      contents: read
    uses: ./.github/workflows/deploy.yml
    with:
      path: projects/platform-governance/bundles/abac-general-access
      resource: okta_group
      target: prod
      group: abac-general-access-prod
    secrets:
      credential: ${{ secrets.DATABRICKS_PROD_CLIENT_SECRET }}
