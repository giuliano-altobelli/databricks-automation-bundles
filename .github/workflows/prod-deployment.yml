name: Production Deployment

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  verify:
    name: Local verify parity
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0

      - name: Bootstrap tooling
        run: uv sync --locked --all-extras --dev

      - name: Run pytest
        run: uv run pytest -q

      - name: Run ruff
        run: uv run ruff check tools tests

      - name: Run prek
        run: uv run prek -c prek.toml run --all-files

      - name: Discover bundles
        run: uv run repoctl discover

      - name: Validate repository metadata
        run: uv run repoctl validate

      - name: Compute changed bundles
        env:
          CHANGED_BASE: ${{ github.event.before }}
          CHANGED_FALLBACK: ${{ github.sha }}
        run: |
          set -euo pipefail
          if [[ -z "$CHANGED_BASE" || "$CHANGED_BASE" =~ ^0+$ ]]; then
            CHANGED_BASE="$CHANGED_FALLBACK"
          fi
          uv run repoctl changed --base "$CHANGED_BASE"

  deploy-prod:
    name: Deploy ABAC Jira project access to prod
    needs: verify
    runs-on: ubuntu-latest
    environment: prod
    concurrency:
      group: abac-jira-project-access-prod
      cancel-in-progress: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Databricks CLI
        uses: databricks/setup-cli@v1.7.0

      - name: Validate, deploy, and apply production bundle
        working-directory: projects/platform-governance/bundles/abac-jira-project-access
        env:
          DATABRICKS_AUTH_TYPE: oauth-m2m
          DATABRICKS_HOST: ${{ vars.DATABRICKS_HOST }}
          DATABRICKS_CLIENT_ID: ${{ vars.DATABRICKS_CLIENT_ID }}
          DATABRICKS_CLIENT_SECRET: ${{ secrets.DATABRICKS_CLIENT_SECRET }}
          BUNDLE_VAR_sql_warehouse_id: ${{ vars.DATABRICKS_SQL_WAREHOUSE_ID }}
          BUNDLE_VAR_run_as_service_principal_name: ${{ vars.DATABRICKS_CLIENT_ID }}
        run: |
          set -euo pipefail
          databricks bundle validate -t prod
          databricks bundle deploy -t prod
          databricks bundle run -t prod apply_abac_jira_project_access
