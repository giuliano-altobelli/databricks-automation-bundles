name: Bundle Deployment

on:
  workflow_call:
    inputs:
      path:
        required: true
        type: string
      resource:
        required: true
        type: string
      target:
        required: true
        type: string
      group:
        required: true
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    name: Deploy collection to ${{ inputs.target }}
    runs-on: ubuntu-22.04
    environment: ${{ inputs.target }}
    concurrency:
      group: ${{ inputs.group }}
      cancel-in-progress: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Databricks CLI
        uses: databricks/setup-cli@v1.7.0

      - name: Validate, deploy, and apply collection
        working-directory: ${{ inputs.path }}
        env:
          DATABRICKS_AUTH_TYPE: github-oidc
          DATABRICKS_HOST: ${{ vars.DATABRICKS_HOST }}
          DATABRICKS_CLIENT_ID: ${{ vars.DATABRICKS_CLIENT_ID }}
          BUNDLE_VAR_sql_warehouse_id: ${{ vars.DATABRICKS_SQL_WAREHOUSE_ID }}
          BUNDLE_VAR_run_as_service_principal_name: ${{ vars.DATABRICKS_CLIENT_ID }}
          BUNDLE_TARGET: ${{ inputs.target }}
          BUNDLE_RESOURCE: ${{ inputs.resource }}
        run: |
          set -euo pipefail
          databricks bundle validate -t "$BUNDLE_TARGET"
          databricks bundle deploy -t "$BUNDLE_TARGET"
          databricks bundle run -t "$BUNDLE_TARGET" "$BUNDLE_RESOURCE"
