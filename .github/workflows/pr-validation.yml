name: PR Validation

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: Local verify parity
    runs-on: ubuntu-22.04
    outputs:
      changed_bundles: ${{ steps.changed_bundles.outputs.changed_bundles }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6.8.0

      - name: Bootstrap tooling
        run: uv sync --locked --all-extras --dev

      - name: Run pytest
        run: uv run pytest -q

      - name: Run ruff
        run: uv run ruff check tools tests

      - name: Run prek
        run: uv run prek -c prek.toml run --all-files

      - name: Discover bundles
        run: uv run repoctl discover

      - name: Validate repository metadata
        run: uv run repoctl validate

      - name: Compute changed bundles
        id: changed_bundles
        env:
          CHANGED_BASE: ${{ github.event.pull_request.base.sha || github.sha }}
        run: |
          set -euo pipefail
          uv run repoctl changed --base "$CHANGED_BASE" > changed-bundles.json
          echo "changed_bundles=$(jq -c '.changed_bundles' changed-bundles.json)" >> "$GITHUB_OUTPUT"
          {
            echo "## Changed bundles"
            echo
            echo "Base: \`$CHANGED_BASE\`"
            echo
            echo "\`\`\`json"
            cat changed-bundles.json
            echo "\`\`\`"
          } >> "$GITHUB_STEP_SUMMARY"

  deploy-uat:
    name: Deploy ABAC Jira project access to UAT
    needs: validate
    if: >-
      github.event_name == 'pull_request' &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.user.login != 'dependabot[bot]' &&
      contains(
        fromJSON(needs.validate.outputs.changed_bundles),
        'projects/platform-governance/bundles/abac-jira-project-access'
      )
    runs-on: ubuntu-22.04
    environment: uat
    concurrency:
      group: abac-jira-project-access-uat
      cancel-in-progress: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Databricks CLI
        uses: databricks/setup-cli@v1.7.0

      - name: Validate, deploy, and apply UAT bundle
        working-directory: projects/platform-governance/bundles/abac-jira-project-access
        env:
          DATABRICKS_AUTH_TYPE: oauth-m2m
          DATABRICKS_HOST: ${{ vars.DATABRICKS_HOST }}
          DATABRICKS_CLIENT_ID: ${{ vars.DATABRICKS_CLIENT_ID }}
          DATABRICKS_CLIENT_SECRET: ${{ secrets.DATABRICKS_CLIENT_SECRET }}
          BUNDLE_VAR_sql_warehouse_id: ${{ vars.DATABRICKS_SQL_WAREHOUSE_ID }}
          BUNDLE_VAR_run_as_service_principal_name: ${{ vars.DATABRICKS_CLIENT_ID }}
        run: |
          set -euo pipefail
          databricks bundle validate -t uat
          databricks bundle deploy -t uat
          databricks bundle run -t uat apply_abac_jira_project_access
