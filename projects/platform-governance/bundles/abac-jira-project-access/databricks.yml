bundle:
  name: abac-jira-project-access
  databricks_cli_version: ">= 1.7.0"

variables:
  access_map_catalog:
    description: Catalog containing the Jira project access map.
  access_map_schema:
    description: Schema containing the Jira project access map.
  access_map_table:
    description: Jira project access-map table name.
  policy_catalog:
    description: Catalog containing the Jira project policy UDF.
  policy_schema:
    description: Schema containing the Jira project policy UDF.
  policy_udf:
    description: Jira project policy UDF name.
  sql_warehouse_id:
    description: Existing SQL warehouse used by the apply job.
  run_as_service_principal_name:
    description: Application ID of the shared-target deployment service principal.
    default: ${workspace.current_user.userName}

resources:
  jobs:
    apply_abac_jira_project_access:
      name: apply_abac_jira_project_access
      max_concurrent_runs: 1
      tasks:
        - task_key: apply_abac_jira_project_access
          sql_task:
            file:
              path: ./sql/apply.sql
              source: WORKSPACE
            warehouse_id: ${var.sql_warehouse_id}
            parameters:
              access_map_catalog: ${var.access_map_catalog}
              access_map_schema: ${var.access_map_schema}
              access_map_table: ${var.access_map_table}
              policy_catalog: ${var.policy_catalog}
              policy_schema: ${var.policy_schema}
              policy_udf: ${var.policy_udf}

targets:
  dev:
    mode: development
    default: true
    workspace:
      root_path: /Workspace/Users/${workspace.current_user.userName}/.bundle/${bundle.name}/${bundle.target}
    variables:
      access_map_catalog: personal
      access_map_schema: ${workspace.current_user.short_name}
      access_map_table: jira_project_access
      policy_catalog: personal
      policy_schema: ${workspace.current_user.short_name}
      policy_udf: can_read_jira_project
  uat:
    mode: production
    workspace:
      root_path: /Workspace/Users/${var.run_as_service_principal_name}/.bundle/${bundle.name}/${bundle.target}
    run_as:
      service_principal_name: ${var.run_as_service_principal_name}
    variables:
      access_map_catalog: dev_security
      access_map_schema: access_maps
      access_map_table: jira_project_access
      policy_catalog: dev_security
      policy_schema: policies
      policy_udf: can_read_jira_project
  prod:
    mode: production
    workspace:
      root_path: /Workspace/Users/${var.run_as_service_principal_name}/.bundle/${bundle.name}/${bundle.target}
    run_as:
      service_principal_name: ${var.run_as_service_principal_name}
    variables:
      access_map_catalog: prod_security
      access_map_schema: access_maps
      access_map_table: jira_project_access
      policy_catalog: prod_security
      policy_schema: policies
      policy_udf: can_read_jira_project
