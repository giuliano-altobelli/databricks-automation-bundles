bundle:
  name: abac-general-access
  databricks_cli_version: ">= 1.7.0"

include:
  - resources/*.yml

sync:
  include:
    - maps/okta-group/client.py
    - maps/okta-group/policy.py
    - maps/okta-group/preflight.py
    - maps/okta-group/reconcile.py

variables:
  location:
    description: Catalog and schema where this collection is deployed.
    type: complex
  sql_warehouse_id:
    description: Existing serverless SQL warehouse used by the function task.
  run_as_service_principal_name:
    description: Application ID of the shared-target deployment service principal.
    default: ${workspace.current_user.userName}

targets:
  dev:
    mode: development
    default: true
    workspace:
      root_path: /Workspace/Users/${workspace.current_user.userName}/.bundle/${bundle.name}/${bundle.target}
    variables:
      location:
        schema: personal.${workspace.current_user.short_name}
  uat:
    mode: production
    workspace:
      root_path: /Workspace/Users/${var.run_as_service_principal_name}/.bundle/${bundle.name}/${bundle.target}
    run_as:
      service_principal_name: ${var.run_as_service_principal_name}
    variables:
      location:
        schema: dev_security.policies
        catalog: dev_abac_demo
    resources:
      jobs:
        okta_group:
          tasks:
            - task_key: preflight
              spark_python_task:
                parameters:
                  - --catalog
                  - ${var.location.catalog}
            - task_key: reconcile
              depends_on:
                - task_key: apply
              spark_python_task:
                python_file: maps/okta-group/reconcile.py
                parameters:
                  - --schema
                  - ${var.location.schema}
                  - --catalog
                  - ${var.location.catalog}
              environment_key: policy
  prod:
    mode: production
    workspace:
      root_path: /Workspace/Users/${var.run_as_service_principal_name}/.bundle/${bundle.name}/${bundle.target}
    run_as:
      service_principal_name: ${var.run_as_service_principal_name}
    variables:
      location:
        schema: prod_security.policies
        catalog: prod_abac_demo
    resources:
      jobs:
        okta_group:
          tasks:
            - task_key: preflight
              spark_python_task:
                parameters:
                  - --catalog
                  - ${var.location.catalog}
            - task_key: reconcile
              depends_on:
                - task_key: apply
              spark_python_task:
                python_file: maps/okta-group/reconcile.py
                parameters:
                  - --schema
                  - ${var.location.schema}
                  - --catalog
                  - ${var.location.catalog}
              environment_key: policy
