resources:
  jobs:
    okta_group:
      name: apply_abac_okta_group_policy
      max_concurrent_runs: 1
      tasks:
        - task_key: preflight
          spark_python_task:
            python_file: ../../abac/okta.py
            parameters:
              - preflight
              - --schema
              - ${var.location.schema}
          environment_key: policy
        - task_key: apply
          depends_on:
            - task_key: preflight
          sql_task:
            file:
              path: ../maps/okta-group/apply.sql
              source: WORKSPACE
            warehouse_id: ${var.sql_warehouse_id}
            parameters:
              schema: ${var.location.schema}
      environments:
        - environment_key: policy
          spec:
            environment_version: "2"
            dependencies:
              - databricks-sdk==0.121.0
