resources:
  jobs:
    okta_group:
      name: apply_abac_okta_group_policy
      max_concurrent_runs: 1
      tasks:
        - task_key: preflight
          sql_task:
            file:
              path: ../sql/preflight.sql
              source: WORKSPACE
            warehouse_id: ${var.sql_warehouse_id}
            parameters:
              policy_schema_fqn: ${var.policy_schema_fqn}
        - task_key: apply
          depends_on:
            - task_key: preflight
          sql_task:
            file:
              path: ../maps/okta-group/apply.sql
              source: WORKSPACE
            warehouse_id: ${var.sql_warehouse_id}
            parameters:
              policy_udf_fqn: ${var.policy_udf_fqn}
