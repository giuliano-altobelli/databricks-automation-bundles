resources:
  jobs:
    project:
      name: apply_abac_jira_project_access
      max_concurrent_runs: 1
      tasks:
        - task_key: preflight_target_schemas
          sql_task:
            file:
              path: ../sql/preflight.sql
              source: WORKSPACE
            warehouse_id: ${var.sql_warehouse_id}
            parameters:
              access_map_schema_fqn: ${var.access_map_schema_fqn}
              policy_schema_fqn: ${var.policy_schema_fqn}
        - task_key: apply_abac_jira_project_access
          depends_on:
            - task_key: preflight_target_schemas
          sql_task:
            file:
              path: ../maps/project/apply.sql
              source: WORKSPACE
            warehouse_id: ${var.sql_warehouse_id}
            parameters:
              access_map_table_fqn: ${var.access_map_table_fqn}
              policy_udf_fqn: ${var.policy_udf_fqn}
        - task_key: update_abac_jira_project_access
          depends_on:
            - task_key: apply_abac_jira_project_access
          spark_python_task:
            python_file: ../maps/project/update.py
            parameters:
              - --table
              - ${var.access_map_table_fqn}
          environment_key: seed
      environments:
        - environment_key: seed
          spec:
            environment_version: "2"
